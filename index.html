                                style={{ background: 'linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%)' }}
                            >
                                <defs>
                                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                        <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
                                    </marker>
                                    <filter id="glow">
                                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                        <feMerge>
                                            <feMergeNode in="coloredBlur"/>
                                            <feMergeNode in="SourceGraphic"/>
                                        </feMerge>
                                    </filter>
                                </defs>
                                
                                {links.map(link => {
                                    const midX = (link.source.x + link.target.x) / 2;
                                    const midY = (link.source.y + link.target.y) / 2;
                                    return (
                                        <g key={link.id}>
                                            <line
                                                x1={link.source.x}
                                                y1={link.source.y}
                                                x2={link.target.x}
                                                y2={link.target.y}
                                                stroke="#6366f1"
                                                strokeWidth="2"
                                                strokeOpacity="0.6"
                                                className="cursor-pointer hover:stroke-red-500"
                                                onClick={() => !linkingMode && setDeleteConfirm(link.id)}
                                            />
                                            <rect
                                                x={midX - 30}
                                                y={midY - 12}
                                                width="60"
                                                height="24"
                                                rx="4"
                                                fill="white"
                                                stroke="#6366f1"
                                                strokeWidth="1"
                                                className="cursor-pointer"
                                                onClick={() => !linkingMode && setDeleteConfirm(link.id)}
                                            />
                                            <text
                                                x={midX}
                                                y={midY + 4}
                                                textAnchor="middle"
                                                fontSize="12"
                                                fill="#4f46e5"
                                                className="pointer-events-none"
                                            >
                                                {link.relation.length > 4 ? link.relation.slice(0, 4) + '...' : link.relation}
                                            </text>
                                        </g>
                                    );
                                })}

                                {nodes.map(node => {
                                    const isFirstLinkNode = linkFirstNode === node.id;
                                    const isSelected = selectedNode === node.id;
                                    return (
                                        <g 
                                            key={node.id}
                                            className="cursor-pointer"
                                            onClick={() => handleNodeClick(node.id)}
                                        >
                                            <circle
                                                cx={node.x}
                                                cy={node.y}
                                                r={isSelected || isFirstLinkNode ? 35 : 30}
                                                fill={isFirstLinkNode ? '#10b981' : isSelected ? '#4f46e5' : '#6366f1'}
                                                stroke="white"
                                                strokeWidth="3"
                                                filter={isFirstLinkNode ? 'url(#glow)' : undefined}
                                                className="transition-all duration-200"
                                            />
                                            <text
                                                x={node.x}
                                                y={node.y - 5}
                                                textAnchor="middle"
                                                fontSize="14"
                                                fontWeight="bold"
                                                fill="white"
                                            >
                                                {node.person.code.slice(0, 4)}
                                            </text>
                                            {node.person.name && (
                                                <text
                                                    x={node.x}
                                                    y={node.y + 12}
                                                    textAnchor="middle"
                                                    fontSize="10"
                                                    fill="white"
                                                    opacity="0.9"
                                                >
                                                    {node.person.name.length > 6 ? node.person.name.slice(0, 6) + '...' : node.person.name}
                                                </text>
                                            )}
                                        </g>
                                    );
                                })}

                                {persons.length === 0 && (
                                    <text x="400" y="300" textAnchor="middle" fontSize="16" fill="#9ca3af">
                                        暂无人物，请先添加人物
                                    </text>
                                )}
                            </svg>

                            {selectedNode && !linkingMode && (
                                <div className="p-4 bg-indigo-50 border-t">
                                    {(() => {
                                        const person = getPersonById(selectedNode);
                                        if (!person) return null;
                                        return (
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">
                                                    {person.code.slice(0, 2)}
                                                </div>
                                                <div>
                                                    <div className="font-semibold">{person.code} {person.name && `- ${person.name}`}</div>
                                                    <div className="text-sm text-gray-500">
                                                        {[person.age && `年龄: ${person.age}`, person.occupation && `职业: ${person.occupation}`].filter(Boolean).join(' | ')}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}
                        </div>
                    )}

                    <div className="bg-white rounded-xl shadow-sm overflow-hidden">
                        <div className="p-4 border-b bg-gray-50">
                            <h3 className="font-semibold text-gray-700">关系列表</h3>
                        </div>
                        <div className="divide-y">
                            {relationships.map(r => (
                                <div key={r.id} className="p-4 flex items-center justify-between hover:bg-gray-50">
                                    <div className="flex items-center gap-4">
                                        <span className="font-semibold text-gray-700">{getPersonDisplay(r.person1Id)}</span>
                                        <span className="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-sm font-medium">{r.relation}</span>
                                        <span className="font-semibold text-gray-700">{getPersonDisplay(r.person2Id)}</span>
                                    </div>
                                    <button
                                        onClick={() => setDeleteConfirm(r.id)}
                                        className="text-gray-400 hover:text-red-500 p-2"
                                        title="删除关系"
                                    >
                                        🗑️
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showLinkModal && (
                        <div className="fixed inset-0 flex items-center justify-center z-50">
                            <div className="absolute inset-0 bg-black/50" onClick={cancelLinking}></div>
                            <div className="bg-white rounded-xl p-6 shadow-xl z-10 max-w-md w-full mx-4">
                                <h4 className="font-semibold text-lg mb-4">创建关系</h4>
                                <div className="flex items-center gap-3 mb-4 p-3 bg-gray-50 rounded-lg">
                                    <div className="flex-1 text-center">
                                        <div className="font-semibold text-indigo-600">{getPersonById(linkFirstNode)?.code}</div>
                                        <div className="text-xs text-gray-500">{getPersonById(linkFirstNode)?.name || '未命名'}</div>
                                    </div>
                                    <div className="text-gray-400">⟷</div>
                                    <div className="flex-1 text-center">
                                        <div className="font-semibold text-indigo-600">{getPersonById(linkSecondNode)?.code}</div>
                                        <div className="text-xs text-gray-500">{getPersonById(linkSecondNode)?.name || '未命名'}</div>
                                    </div>
                                </div>
                                <input
                                    type="text"
                                    placeholder="输入关系名称（如：同事、朋友、家人）"
                                    value={linkRelation}
                                    onChange={e => setLinkRelation(e.target.value)}
                                    className="w-full border rounded-lg px-4 py-2 mb-4"
                                    autoFocus
                                />
                                <div className="flex gap-2">
                                    <button onClick={handleCreateLink} className="flex-1 bg-indigo-600 text-white px-4 py-2 rounded-lg">创建关系</button>
                                    <button onClick={cancelLinking} className="bg-gray-200 px-4 py-2 rounded-lg">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteConfirm && (
                        <div className="fixed inset-0 flex items-center justify-center z-50">
                            <div className="absolute inset-0 bg-black/50" onClick={() => setDeleteConfirm(null)}></div>
                            <div className="bg-white rounded-xl p-6 shadow-xl z-10 max-w-sm">
                                <h4 className="font-semibold text-lg mb-2">确认删除</h4>
                                <p className="text-gray-600 mb-4">确定要删除这条关系吗？</p>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => { onDelete(deleteConfirm); setDeleteConfirm(null); }}
                                        className="bg-red-500 text-white px-4 py-2 rounded-lg"
                                    >
                                        删除
                                    </button>
                                    <button 
                                        onClick={() => setDeleteConfirm(null)}
                                        className="bg-gray-200 px-4 py-2 rounded-lg"
                                    >
                                        取消
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {relationships.length === 0 && persons.length > 0 && !showAdd && (
                        <div className="text-center py-16 text-gray-500">
                            <p className="text-4xl mb-4">🔗</p>
                            <p>还没有关系记录</p>
                            <p className="text-sm mt-2">点击「连线模式」在图中连线，或点击「添加关系」按钮</p>
                        </div>
                    )}

                    {persons.length === 0 && (
                        <div className="text-center py-16 text-gray-500">
                            <p className="text-4xl mb-4">👥</p>
                            <p>请先添加人物</p>
                            <p className="text-sm mt-2">在「人物」页面添加人物后，即可建立关系网络</p>
                        </div>
                    )}
                </div>
            );
        }

        function SettingsView({ apiKey, onSaveKey }) {
            const [key, setKey] = useState(apiKey);

            return (
                <div className="p-8">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">设置</h2>
                    
                    <div className="bg-white rounded-xl p-6 shadow-sm max-w-xl">
                        <h3 className="font-semibold mb-4">AI 配置</h3>
                        <label className="block text-sm text-gray-600 mb-2">GLM API Key</label>
                        <input
                            type="password"
                            value={key}
                            onChange={e => setKey(e.target.value)}
                            className="w-full border rounded-lg px-4 py-2 mb-4"
                            placeholder="输入你的 GLM API Key"
                        />
                        <button 
                            onClick={() => onSaveKey(key)}
                            className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700"
                        >
                            保存
                        </button>
                        <p className="text-xs text-gray-500 mt-4">
                            API Key 用于调用智谱 AI 的对话服务。你可以在 <a href="https://open.bigmodel.cn" target="_blank" className="text-indigo-600">open.bigmodel.cn</a> 获取。
                        </p>
                    </div>

                    <div className="bg-white rounded-xl p-6 shadow-sm max-w-xl mt-6">
                        <h3 className="font-semibold mb-4">数据管理</h3>
                        <button 
                            onClick={() => {
                                if (confirm('确定要清除所有数据吗？')) {
                                    localStorage.clear();
                                    window.location.reload();
                                }
                            }}
                            className="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600"
                        >
                            清除所有数据
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
